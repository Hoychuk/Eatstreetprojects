name: Playwright Tests

on:
  push:
    branches: [ "main" ]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_HEADLESS: ${{ vars.PLAYWRIGHT_HEADLESS || 'true' }}

    strategy:
      matrix:
        browser: [chromium]

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Install Virtual Frame Buffer
      if: ${{ env.PLAYWRIGHT_HEADLESS == 'false' }}
      run: sudo apt-get update && sudo apt-get install -y xvfb

    - name: Run Playwright tests
      run: |
        if [ "${PLAYWRIGHT_HEADLESS}" = "false" ]; then
          xvfb-run -a npx playwright test --project=${{ matrix.browser }} --retries=2 --trace on
        else
          npx playwright test --project=${{ matrix.browser }} --retries=2 --trace on
        fi

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-${{ matrix.browser }}
        path: playwright-report/
        retention-days: 30